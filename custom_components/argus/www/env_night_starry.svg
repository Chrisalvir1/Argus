<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#fff;stop-opacity:0" />
    </radialGradient>
  </defs>
  <style>
    .star-twinkle { fill: #fff; animation: twinkle-slow 4s ease-in-out infinite; }
    @keyframes twinkle-slow { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.9; } }
    .shooting-star { fill: #fff; opacity: 0; animation: shoot 10s linear infinite; }
    @keyframes shoot { 0% { transform: translate(1200px, 0) scale(0); opacity: 0; } 10% { opacity: 1; } 20% { transform: translate(800px, 300px) scale(1); opacity: 0; } }
  </style>
  <rect width="1200" height="600" fill="#0c1445" />
  
  <circle cx="1000" cy="100" r="80" fill="url(#moonGlow)" />
  <circle cx="1000" cy="100" r="40" fill="#fcfcfc" />
  
  <circle cx="100" cy="100" r="1.2" class="star-twinkle" />
  <circle cx="200" cy="300" r="1.5" class="star-twinkle" style="animation-delay: 1s" />
  <circle cx="450" cy="50" r="1" class="star-twinkle" style="animation-delay: 2s" />
  <circle cx="700" cy="250" r="1.3" class="star-twinkle" style="animation-delay: 0.5s" />
  <circle cx="850" cy="400" r="1.1" class="star-twinkle" style="animation-delay: 1.5s" />
  <circle cx="300" cy="500" r="1.4" class="star-twinkle" style="animation-delay: 2.5s" />
  
  <path d="M0,0 L100,2" class="shooting-star" />
</svg>
