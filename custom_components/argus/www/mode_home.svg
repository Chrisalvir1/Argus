<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="houseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90e2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357abd;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <style>
    .chain { stroke: #ffd700; fill: none; stroke-width: 8; stroke-linecap: round; filter: url(#glow); stroke-dasharray: 20 10; animation: dash 3s linear infinite; }
    @keyframes dash { to { stroke-dashoffset: -30; } }
    .house-body { fill: url(#houseGrad); }
    .roof { fill: #2c3e50; }
    .window { fill: #f1c40f; animation: light 2s ease-in-out infinite alternate; }
    @keyframes light { from { opacity: 0.5; } to { opacity: 1; } }
    .pulse { fill: #ffd700; opacity: 0.2; animation: pulse 2s ease-out infinite; }
    @keyframes pulse { 0% { r: 50; opacity: 0.5; } 100% { r: 180; opacity: 0; } }
  </style>
  <rect width="400" height="400" fill="none"/>
  
  <!-- Pulse effect -->
  <circle cx="200" cy="220" r="100" class="pulse" />
  
  <!-- House -->
  <path class="house-body" d="M100,320 L300,320 L300,200 L100,200 Z" />
  <path class="roof" d="M80,210 L200,80 L320,210 Z" />
  <rect x="140" y="240" width="30" height="30" class="window" />
  <rect x="230" y="240" width="30" height="30" class="window" />
  <rect x="185" y="270" width="30" height="50" fill="#7f8c8d" />
  
  <!-- Chains -->
  <circle cx="200" cy="210" r="140" class="chain" />
  <path class="chain" d="M50,210 Q200,380 350,210" />
  <path class="chain" d="M50,210 Q200,40 350,210" />
</svg>
