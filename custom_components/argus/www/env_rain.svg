<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" preserveAspectRatio="xMidYMid slice">
  <style>
    .drop { stroke: #bcd4e6; stroke-width: 1; opacity: 0.4; animation: fall 0.8s linear infinite; }
    @keyframes fall { from { transform: translateY(-100px); } to { transform: translateY(700px); } }
  </style>
  <rect width="1200" height="600" fill="#2c3e50" opacity="0.3" />
  
  <!-- Group of rain drops -->
  <line x1="100" y1="0" x2="100" y2="20" class="drop" style="animation-delay: 0.1s" />
  <line x1="200" y1="0" x2="200" y2="20" class="drop" style="animation-delay: 0.3s" />
  <line x1="350" y1="0" x2="350" y2="20" class="drop" style="animation-delay: 0.5s" />
  <line x1="500" y1="0" x2="500" y2="20" class="drop" style="animation-delay: 0.2s" />
  <line x1="650" y1="0" x2="650" y2="20" class="drop" style="animation-delay: 0.4s" />
  <line x1="800" y1="0" x2="800" y2="20" class="drop" style="animation-delay: 0.6s" />
  <line x1="950" y1="0" x2="950" y2="20" class="drop" style="animation-delay: 0.1s" />
  <line x1="1100" y1="0" x2="1100" y2="20" class="drop" style="animation-delay: 0.7s" />
</svg>
