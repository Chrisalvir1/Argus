<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
<style>
  /* Star twinkle - staggered */
  .star1 { animation: twinkle 2.0s ease-in-out infinite; }
  .star2 { animation: twinkle 3.2s ease-in-out infinite 0.4s; }
  .star3 { animation: twinkle 2.6s ease-in-out infinite 0.9s; }
  .star4 { animation: twinkle 4.0s ease-in-out infinite 1.2s; }
  .star5 { animation: twinkle 2.8s ease-in-out infinite 0.2s; }
  .star6 { animation: twinkle 3.5s ease-in-out infinite 1.6s; }
  @keyframes twinkle { 0%,100% { opacity:.2; } 50% { opacity:1; } }

  /* Moon glow */
  .moon { animation: moon-glow 3s ease-in-out infinite; }
  @keyframes moon-glow {
    0%,100% { filter: drop-shadow(0 0 6px #fbbf24) drop-shadow(0 0 14px #f59e0b); }
    50%      { filter: drop-shadow(0 0 18px #fbbf24) drop-shadow(0 0 32px #fbbf24); }
  }

  /* Camera sweep */
  .cam { transform-origin: 310px 115px; animation: cam-sweep 5s ease-in-out infinite alternate; }
  @keyframes cam-sweep { from { transform: rotate(12deg); } to { transform: rotate(-12deg); } }

  /* Recording dot blink */
  .rec { animation: rec-blink 1.5s ease-in-out infinite; }
  @keyframes rec-blink { 0%,100% { opacity:1; } 50% { opacity:.08; } }

  /* Bedroom ambient flicker (very subtle) */
  .ambient { animation: ambient 6s ease-in-out infinite; }
  @keyframes ambient { 0%,100% { opacity:.08; } 50% { opacity:.18; } }
</style>

<!-- Dark room background -->
<rect width="400" height="400" fill="none"/>

<!-- Wall -->
<rect x="30" y="60" width="340" height="290" rx="10" fill="#1e293b"/>
<!-- Ceiling / floor hints -->
<rect x="30" y="60" width="340" height="14" rx="5" fill="#0f172a" opacity="0.7"/>
<rect x="30" y="336" width="340" height="14" rx="5" fill="#0f172a" opacity="0.7"/>

<!-- ── WINDOW ── -->
<rect x="120" y="80" width="160" height="130" rx="8" fill="#0f172a"/>
<!-- Night sky inside window -->
<rect x="123" y="83" width="154" height="124" rx="6" fill="#0c1a35"/>
<!-- Window frame cross -->
<line x1="200" y1="83" x2="200" y2="207" stroke="#334155" stroke-width="4"/>
<line x1="123" y1="145" x2="277" y2="145" stroke="#334155" stroke-width="4"/>
<!-- Window border -->
<rect x="120" y="80" width="160" height="130" rx="8" fill="none" stroke="#334155" stroke-width="5"/>

<!-- Stars in window -->
<circle class="star1" cx="145" cy="100" r="2.5" fill="#f8fafc"/>
<circle class="star2" cx="170" cy="115" r="2" fill="#f8fafc"/>
<circle class="star3" cx="225" cy="95" r="3" fill="#f8fafc"/>
<circle class="star4" cx="255" cy="110" r="2" fill="#f8fafc"/>
<circle class="star5" cx="152" cy="168" r="2" fill="#f8fafc"/>
<circle class="star6" cx="248" cy="172" r="2.5" fill="#f8fafc"/>

<!-- Moon -->
<g class="moon">
  <circle cx="215" cy="128" r="22" fill="#fbbf24"/>
  <!-- Moon crescent mask -->
  <circle cx="225" cy="121" r="18" fill="#0c1a35"/>
</g>

<!-- Window ambient glow on floor -->
<ellipse class="ambient" cx="200" cy="340" rx="80" ry="12" fill="#fbbf24"/>
<!-- Moonbeam strip -->
<rect x="170" y="210" width="60" height="130" fill="url(#moonbeam)" opacity="0.08"/>
<defs>
  <linearGradient id="moonbeam" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#fbbf24" stop-opacity="1"/>
    <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
  </linearGradient>
</defs>

<!-- ── BED ── -->
<!-- Bed frame -->
<rect x="70" y="262" width="260" height="85" rx="8" fill="#334155"/>
<!-- Mattress -->
<rect x="76" y="270" width="248" height="72" rx="6" fill="#475569"/>
<!-- Blanket -->
<rect x="76" y="285" width="248" height="57" rx="6" fill="#3d5a80"/>
<!-- Blanket folds -->
<path d="M90 295 Q120 288 150 296 Q180 304 210 295 Q240 286 270 295 Q295 302 320 295" fill="none" stroke="#4a6fa5" stroke-width="2" opacity="0.6"/>
<path d="M90 310 Q120 303 150 311 Q180 319 210 310 Q240 301 270 310 Q295 317 320 310" fill="none" stroke="#4a6fa5" stroke-width="2" opacity="0.6"/>
<!-- Pillow -->
<rect x="90" y="268" width="100" height="40" rx="10" fill="#e2e8f0"/>
<ellipse cx="140" cy="288" rx="42" ry="16" fill="none" stroke="#cbd5e1" stroke-width="1.5" opacity="0.5"/>
<!-- Headboard -->
<rect x="70" y="240" width="260" height="28" rx="6" fill="#1e3a5f"/>
<rect x="76" y="244" width="248" height="20" rx="4" fill="#0f2744"/>

<!-- ── CAMERA (wall, upper-right) ── -->
<g class="cam" transform="translate(310,115)">
  <!-- Mount -->
  <rect x="-4" y="-18" width="8" height="18" rx="2" fill="#475569"/>
  <!-- Camera body -->
  <rect x="-18" y="-8" width="28" height="14" rx="4" fill="#334155"/>
  <!-- Lens -->
  <circle cx="11" cy="-1" r="6" fill="#1e293b"/>
  <circle cx="11" cy="-1" r="4" fill="#2dd4bf" opacity="0.5"/>
  <!-- Rec dot -->
  <circle cx="-10" cy="-14" r="3.5" fill="#ef4444" class="rec"/>
</g>

<!-- Baseboard -->
<rect x="30" y="336" width="340" height="14" rx="5" fill="#0f172a" opacity="0.6"/>
<!-- Floor -->
<rect x="30" y="345" width="340" height="20" rx="5" fill="#162032"/>

<!-- Subtle blue ambient from window on left wall -->
<rect x="30" y="130" width="90" height="120" fill="url(#wallglow)" opacity="0.12"/>
<defs>
  <linearGradient id="wallglow" x1="1" y1="0" x2="0" y2="0">
    <stop offset="0%" stop-color="#7dd3fc" stop-opacity="1"/>
    <stop offset="100%" stop-color="#7dd3fc" stop-opacity="0"/>
  </linearGradient>
</defs>
</svg>
