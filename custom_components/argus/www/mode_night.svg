<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <filter id="moon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <style>
    .moon { fill: #f1c40f; filter: url(#moon-glow); animation: float 6s ease-in-out infinite; }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
    .star { fill: #fff; animation: twinkle 3s ease-in-out infinite; }
    @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    .z { fill: #ecf0f1; font-family: Arial; font-weight: bold; font-size: 40px; opacity: 0; animation: sleep 4s linear infinite; }
    @keyframes sleep { 0% { transform: translate(220px, 150px) scale(0.5); opacity: 0; } 50% { opacity: 0.5; } 100% { transform: translate(260px, 80px) scale(1.2); opacity: 0; } }
  </style>
  <rect width="400" height="400" fill="none"/>
  
  <circle cx="100" cy="80" r="2" class="star" />
  <circle cx="300" cy="120" r="3" class="star" style="animation-delay: 1s"/>
  <circle cx="200" cy="50" r="2" class="star" style="animation-delay: 2s"/>
  
  <path class="moon" d="M150,200 Q150,100 250,100 Q200,100 200,200 Q200,300 250,300 Q150,300 150,200 Z" />
  
  <text class="z">Z</text>
  <text class="z" style="animation-delay: 1.3s">Z</text>
  <text class="z" style="animation-delay: 2.6s">Z</text>
</svg>
