<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <style>
    .plane { fill: #ecf0f1; animation: flight 8s linear infinite; }
    @keyframes flight { 0% { transform: translate(-100px, 50px) rotate(10deg); } 100% { transform: translate(500px, -50px) rotate(10deg); } }
    .radar { fill: none; stroke: #3498db; stroke-width: 2; opacity: 0.5; animation: ping 3s ease-out infinite; }
    @keyframes ping { 0% { r: 50; opacity: 1; } 100% { r: 180; opacity: 0; } }
    .palm { fill: #27ae60; }
  </style>
  <rect width="400" height="400" fill="none"/>
  
  <!-- Radar circles -->
  <circle cx="200" cy="200" r="100" class="radar" />
  <circle cx="200" cy="200" r="150" class="radar" style="animation-delay: 1s"/>
  
  <path class="palm" d="M180,300 Q200,250 220,300 L200,350 Z" /> <!-- Base trunk -->
  <circle cx="200" cy="200" r="5" fill="#3498db" /> <!-- Center node -->
  
  <g class="plane">
    <path d="M0,0 L40,0 L50,10 L10,10 Z" />
    <path d="M20,0 L25,-15 L35,0 Z" />
  </g>
</svg>
