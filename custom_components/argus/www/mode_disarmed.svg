<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <filter id="green-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <style>
    .bg-circle { fill: #2ecc71; opacity: 0.1; animation: soft-pulse 4s ease-in-out infinite; }
    @keyframes soft-pulse { 0%, 100% { transform: scale(1); opacity: 0.1; } 50% { transform: scale(1.1); opacity: 0.2; } }
    .house { fill: #95a5a6; }
    .check { fill: none; stroke: #2ecc71; stroke-width: 25; stroke-linecap: round; stroke-linejoin: round; filter: url(#green-glow); stroke-dasharray: 200; stroke-dashoffset: 200; animation: draw 1s ease-out forwards 0.5s; }
    @keyframes draw { to { stroke-dashoffset: 0; } }
  </style>
  <rect width="400" height="400" fill="none"/>
  
  <circle cx="200" cy="200" r="150" class="bg-circle" />
  
  <!-- House (Small/Friendly) -->
  <path class="house" d="M150,280 L250,280 L250,220 L150,220 Z" />
  <path class="house" d="M140,225 L200,160 L260,225 Z" />
  
  <!-- Checkmark -->
  <polyline points="120,200 180,260 300,140" class="check" />
</svg>
