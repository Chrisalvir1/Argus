<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
<style>
  /* Sun rays rotation */
  .sun-rays { transform-origin: 330px 70px; animation: spin 12s linear infinite; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  /* Tree sway from base */
  .tree { transform-origin: 100px 310px; animation: sway 3s ease-in-out infinite alternate; }
  @keyframes sway { from { transform: rotate(-5deg); } to { transform: rotate(5deg); } }

  /* Birds flight */
  .bird1 { animation: fly1 9s linear infinite; }
  .bird2 { animation: fly2 12s linear infinite 4s; }
  @keyframes fly1 { from { transform: translateX(-20px); } to { transform: translateX(430px); } }
  @keyframes fly2 { from { transform: translateX(-20px); } to { transform: translateX(430px); } }

  /* Chain fall + fade */
  .chain-fall { animation: fall 4s ease-in infinite; }
  @keyframes fall {
    0%   { transform: translateY(0);   opacity:1; }
    45%  { transform: translateY(25px); opacity:0; }
    100% { transform: translateY(25px); opacity:0; }
  }

  /* Padlock open bounce */
  .lock-open { animation: lock-bounce 4s ease-in-out infinite; }
  @keyframes lock-bounce {
    0%,100% { transform: translateY(0) rotate(-5deg); }
    50%     { transform: translateY(-4px) rotate(0deg); }
  }
</style>
<defs>
  <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#bae6fd"/>
    <stop offset="100%" stop-color="#e0f2fe"/>
  </linearGradient>
  <linearGradient id="grassGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#86efac"/>
    <stop offset="100%" stop-color="#4ade80"/>
  </linearGradient>
</defs>

<!-- Sky -->
<rect width="400" height="400" fill="none"/>
<rect x="0" y="0" width="400" height="360" rx="0" fill="url(#skyGrad)" opacity="0.25"/>

<!-- ── SUN ── -->
<!-- Rotating rays -->
<g class="sun-rays">
  <g stroke="#f59e0b" stroke-width="3" stroke-linecap="round">
    <line x1="330" y1="45" x2="330" y2="30"/>
    <line x1="330" y1="95" x2="330" y2="110"/>
    <line x1="305" y1="70" x2="290" y2="70"/>
    <line x1="355" y1="70" x2="370" y2="70"/>
    <line x1="312" y1="52" x2="301" y2="41"/>
    <line x1="348" y1="88" x2="359" y2="99"/>
    <line x1="348" y1="52" x2="359" y2="41"/>
    <line x1="312" y1="88" x2="301" y2="99"/>
  </g>
</g>
<!-- Sun circle -->
<circle cx="330" cy="70" r="24" fill="#fbbf24"/>
<circle cx="330" cy="70" r="20" fill="#fde68a"/>

<!-- ── HOUSE ── -->
<!-- Walls -->
<rect x="140" y="200" width="200" height="155" rx="4" fill="#d6bcaa"/>
<!-- Brick lines -->
<g fill="none" stroke="#c4a98e" stroke-width="1" opacity="0.6">
  <line x1="140" y1="225" x2="340" y2="225"/>
  <line x1="140" y1="250" x2="340" y2="250"/>
  <line x1="140" y1="275" x2="340" y2="275"/>
  <line x1="140" y1="300" x2="340" y2="300"/>
  <line x1="140" y1="325" x2="340" y2="325"/>
  <line x1="180" y1="200" x2="180" y2="225"/><line x1="225" y1="200" x2="225" y2="225"/><line x1="270" y1="200" x2="270" y2="225"/><line x1="315" y1="200" x2="315" y2="225"/>
  <line x1="160" y1="225" x2="160" y2="250"/><line x1="210" y1="225" x2="210" y2="250"/><line x1="260" y1="225" x2="260" y2="250"/><line x1="310" y1="225" x2="310" y2="250"/>
</g>
<!-- Roof -->
<polygon points="125,203 240,125 355,203" fill="#92400e" opacity="0.85"/>
<polygon points="125,203 240,125 355,203" fill="none" stroke="#78350f" stroke-width="2"/>
<!-- Door -->
<rect x="213" y="290" width="54" height="65" rx="5" fill="#78350f"/>
<rect x="216" y="293" width="48" height="59" rx="4" fill="#92400e" opacity="0.7"/>
<!-- Window -->
<rect x="155" y="220" width="50" height="45" rx="5" fill="#bae6fd" opacity="0.8"/>
<rect x="280" y="220" width="50" height="45" rx="5" fill="#bae6fd" opacity="0.8"/>
<line x1="180" y1="220" x2="180" y2="265" stroke="white" stroke-width="1.5" opacity="0.6"/>
<line x1="155" y1="242" x2="205" y2="242" stroke="white" stroke-width="1.5" opacity="0.6"/>
<line x1="305" y1="220" x2="305" y2="265" stroke="white" stroke-width="1.5" opacity="0.6"/>
<line x1="280" y1="242" x2="330" y2="242" stroke="white" stroke-width="1.5" opacity="0.6"/>

<!-- ── BROKEN CHAIN LINKS ── -->
<g class="chain-fall" transform="translate(195,340)">
  <path d="M4 0 Q0 -5 -4 0 Q-8 5 -4 10 Q0 15 4 10 Q8 5 4 0Z" fill="none" stroke="#94a3b8" stroke-width="2"/>
  <path d="M16 4 Q12 -1 8 4 Q4 9 8 14 Q12 19 16 14 Q20 9 16 4Z" fill="none" stroke="#94a3b8" stroke-width="2"/>
  <path d="M30 0 Q26 -5 22 0 Q18 5 22 10 Q26 15 30 10 Q34 5 30 0Z" fill="none" stroke="#94a3b8" stroke-width="2"/>
</g>

<!-- ── OPEN PADLOCK ── -->
<g class="lock-open" transform="translate(225,308)">
  <!-- shackle open to the right -->
  <path d="M2 14 L2 5 Q2 -6 15 -6 Q28 -6 28 5 L28 1" fill="none" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <!-- body -->
  <rect x="0" y="14" width="30" height="22" rx="5" fill="#94a3b8"/>
  <rect x="2" y="16" width="26" height="18" rx="3" fill="#cbd5e1"/>
  <!-- open keyhole -->
  <circle cx="15" cy="23" r="3.5" fill="#64748b"/>
  <rect x="12.5" y="23" width="5" height="6" fill="#64748b"/>
</g>

<!-- ── TREE ── -->
<g class="tree">
  <!-- Trunk -->
  <rect x="92" y="278" width="16" height="55" rx="4" fill="#92400e"/>
  <!-- Foliage layers -->
  <polygon points="100,150 136,248 64,248" fill="#15803d"/>
  <polygon points="100,175 130,255 70,255" fill="#16a34a"/>
  <polygon points="100,200 128,265 72,265" fill="#22c55e"/>
</g>

<!-- ── GRASS ── -->
<rect x="0" y="352" width="400" height="48" rx="8" fill="url(#grassGrad)" opacity="0.7"/>
<!-- Grass blades -->
<g fill="#4ade80" opacity="0.8">
  <path d="M20 352 Q22 340 24 352"/>
  <path d="M50 352 Q53 338 56 352"/>
  <path d="M350 352 Q353 340 356 352"/>
  <path d="M380 352 Q382 342 384 352"/>
</g>

<!-- ── BIRDS ── -->
<g class="bird1" transform="translate(30,90)">
  <path d="M0 0 Q5 -6 10 0 Q15 -6 20 0" fill="none" stroke="#334155" stroke-width="2.5" stroke-linecap="round"/>
</g>
<g class="bird2" transform="translate(80,115)">
  <path d="M0 0 Q5 -5 10 0 Q15 -5 20 0" fill="none" stroke="#334155" stroke-width="2" stroke-linecap="round"/>
</g>
</svg>
