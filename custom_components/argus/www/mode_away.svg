<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="lockGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1" />
    </linearGradient>
    <filter id="red-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <style>
    .grid-line { stroke: #e74c3c; stroke-width: 1; opacity: 0.3; animation: scanner 4s linear infinite; }
    @keyframes scanner { 0% { transform: translateY(-200px); } 100% { transform: translateY(200px); } }
    .lock-body { fill: url(#lockGrad); filter: url(#red-glow); }
    .shackle { fill: none; stroke: #7f8c8d; stroke-width: 25; stroke-linecap: round; }
    .eye { fill: #fff; animation: blink 3s step-end infinite; }
    @keyframes blink { 0%, 90% { opacity: 1; } 95% { opacity: 0; } }
  </style>
  <rect width="400" height="400" fill="none"/>
  
  <!-- Security Grid -->
  <g class="grid">
    <line x1="0" y1="100" x2="400" y2="100" class="grid-line" />
    <line x1="0" y1="200" x2="400" y2="200" class="grid-line" />
    <line x1="0" y1="300" x2="400" y2="300" class="grid-line" />
    <line x1="100" y1="0" x2="100" y2="400" class="grid-line" />
    <line x1="200" y1="0" x2="200" y2="400" class="grid-line" />
    <line x1="300" y1="0" x2="300" y2="400" class="grid-line" />
  </g>
  
  <!-- Lock -->
  <path class="shackle" d="M130,200 L130,130 Q130,70 200,70 Q270,70 270,130 L270,200" />
  <rect x="110" y="200" width="180" height="140" rx="20" class="lock-body" />
  <circle cx="200" cy="270" r="15" fill="#2c3e50" />
  <rect x="195" y="270" width="10" height="30" fill="#2c3e50" />
</svg>
