<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="skyDay" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#add8e6;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#87ceeb;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  <style>
    .sun-ray { fill: #fff; opacity: 0.1; transform-origin: center; animation: rotate 20s linear infinite; }
    @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .cloud { fill: #fff; opacity: 0.4; animation: drift 60s linear infinite; }
    @keyframes drift { from { transform: translateX(-200px); } to { transform: translateX(1400px); } }
  </style>
  <rect width="1200" height="600" fill="url(#skyDay)" />
  
  <path class="sun-ray" d="M600,300 L0,0 L1200,0 Z" />
  <path class="sun-ray" d="M600,300 L1200,600 L1200,0 Z" style="transform: rotate(90deg)" />
  
  <circle cx="200" cy="150" r="40" class="cloud" />
  <circle cx="240" cy="150" r="50" class="cloud" />
  <circle cx="180" cy="170" r="30" class="cloud" />
  
  <circle cx="800" cy="100" r="60" class="cloud" style="animation-duration: 45s; opacity: 0.2" />
</svg>
